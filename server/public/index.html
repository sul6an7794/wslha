  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 value=\"{{ isLoggedIn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); padding:6px 6px 6px 16px; border-radius:30px;\">\n        <span style=\"font-size:14px; font-weight:700; color:#f1f0ff;\">{{ user.username }}<\u002Fspan>\n        <button onclick=\"{{ logout }}\" style=\"font-family:'Tajawal',sans-serif; font-size:13px; font-weight:700; color:#a9a7cc; background:rgba(255,255,255,.07); border:none; padding:6px 13px; border-radius:20px; cursor:pointer;\" style-hover=\"color:#fff;\">خروج<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div style=\"height:71px;\"><\u002Fdiv>\n\n<!-- HOME -->\n<sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"position:relative; z-index:1; animation:tqIn .4s ease;\" data-screen-label=\"Home\">\n  <div style=\"max-width:780px; margin:0 auto; padding:84px 28px 56px; text-align:center;\">\n    <h1 style=\"font-size:clamp(48px,8vw,84px); font-weight:900; line-height:1; margin:24px 0 16px;\"><span style=\"background:linear-gradient(135deg,#818cf8,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent;\">وصّلها<\u002Fspan><\u002Fh1>\n    <p style=\"font-size:clamp(18px,3vw,24px); font-weight:800; color:#f1f0ff; margin:0 0 20px;\">اشرحها صح… ولا تضيعهم.<\u002Fp>\n    <p style=\"font-size:18px; color:#a9a7cc; line-height:1.8; margin:0 auto 34px; max-width:540px;\">جمّع فريقك، كل واحد قدامه صورة، والباقي عليكم. وصّف، اسمع، واربطوا التفاصيل قبل لا يسبقكم غيركم. غلطة وحدة توقفكم 15 ثانية… فمافي مجال للهبد.<\u002Fp>\n    <div style=\"display:flex; gap:14px; flex-wrap:wrap; justify-content:center;\">\n      <button onclick=\"{{ goCreate }}\" style=\"display:flex; align-items:center; gap:8px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:18px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:16px 34px; border-radius:16px; cursor:pointer; box-shadow:0 16px 40px rgba(236,72,153,.45);\" style-hover=\"filter:brightness(1.08);\">{{ iconPlus }} ابدأ التحدي<\u002Fbutton>\n      <button onclick=\"{{ goJoin }}\" style=\"display:flex; align-items:center; gap:8px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:18px; color:#f1f0ff; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); padding:16px 34px; border-radius:16px; cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.1);\">{{ iconEnter }} الانضمام إلى غرفة<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1100px; margin:0 auto; padding:0 28px 80px;\">\n    <div style=\"text-align:center; margin-bottom:40px;\">\n      <div style=\"font-size:14px; font-weight:700; color:#818cf8; letter-spacing:2px; margin-bottom:12px;\">المميزات<\u002Fdiv>\n      <h2 style=\"font-size:clamp(26px,4vw,40px); font-weight:900; margin:0;\">لماذا وصّلها؟<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px;\">\n      <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:28px;\">\n        <div style=\"width:50px; height:50px; background:rgba(129,140,248,.15); border-radius:14px; display:flex; align-items:center; justify-content:center; color:#818cf8; margin-bottom:16px;\">{{ iconUsers }}<\u002Fdiv>\n        <h3 style=\"font-size:18px; font-weight:800; margin:0 0 8px;\">فريق واحد<\u002Fh3>\n        <p style=\"font-size:14px; color:#a9a7cc; margin:0; line-height:1.6;\">3 لاعبين بروح وحدة — تفاهمكم هو سرّ الفوز.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:28px;\">\n        <div style=\"width:50px; height:50px; background:rgba(236,72,153,.15); border-radius:14px; display:flex; align-items:center; justify-content:center; color:#ec4899; margin-bottom:16px;\">{{ iconClock }}<\u002Fdiv>\n        <h3 style=\"font-size:18px; font-weight:800; margin:0 0 8px;\">السرعة تكسب<\u002Fh3>\n        <p style=\"font-size:14px; color:#a9a7cc; margin:0; line-height:1.6;\">الساعة شغّالة من أول ثانية — الأسرع يطلع فوق.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:28px;\">\n        <div style=\"width:50px; height:50px; background:rgba(56,189,248,.15); border-radius:14px; display:flex; align-items:center; justify-content:center; color:#38bdf8; margin-bottom:16px;\">{{ iconImg }}<\u002Fdiv>\n        <h3 style=\"font-size:18px; font-weight:800; margin:0 0 8px;\">صورتك سرّ<\u002Fh3>\n        <p style=\"font-size:14px; color:#a9a7cc; margin:0; line-height:1.6;\">كل واحد قدامه صورة غير — وسلاحك الوحيد كلامك.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:28px;\">\n        <div style=\"width:50px; height:50px; background:rgba(129,140,248,.15); border-radius:14px; display:flex; align-items:center; justify-content:center; color:#818cf8; margin-bottom:16px;\">{{ iconLock }}<\u002Fdiv>\n        <h3 style=\"font-size:18px; font-weight:800; margin:0 0 8px;\">غرفتك الخاصة<\u002Fh3>\n        <p style=\"font-size:14px; color:#a9a7cc; margin:0; line-height:1.6;\">سوِّ غرفة وجمّع فريقك برقم من 6 أرقام بس.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:28px;\">\n        <div style=\"width:50px; height:50px; background:rgba(236,72,153,.15); border-radius:14px; display:flex; align-items:center; justify-content:center; color:#ec4899; margin-bottom:16px;\">{{ iconShare }}<\u002Fdiv>\n        <h3 style=\"font-size:18px; font-weight:800; margin:0 0 8px;\">جمّعهم بثانية<\u002Fh3>\n        <p style=\"font-size:14px; color:#a9a7cc; margin:0; line-height:1.6;\">شارك الـQR أو الرابط، وخلّهم يلحقونك.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:28px;\">\n        <div style=\"width:50px; height:50px; background:rgba(251,191,36,.15); border-radius:14px; display:flex; align-items:center; justify-content:center; color:#fbbf24; margin-bottom:16px;\">{{ iconTrophy }}<\u002Fdiv>\n        <h3 style=\"font-size:18px; font-weight:800; margin:0 0 8px;\">مين البطل؟<\u002Fh3>\n        <p style=\"font-size:14px; color:#a9a7cc; margin:0; line-height:1.6;\">ترتيب لحظي للفرق، والفايز يتتوّج بعد آخر جولة.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- JOIN -->\n<sc-if value=\"{{ isJoin }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:relative; z-index:1; max-width:480px; margin:0 auto; padding:64px 24px 80px; animation:tqIn .4s ease;\" data-screen-label=\"Join\">\n  <div style=\"background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:28px; padding:40px; backdrop-filter:blur(16px); box-shadow:0 30px 80px rgba(0,0,0,.4);\">\n    <div style=\"text-align:center; margin-bottom:32px;\">\n      <div style=\"width:60px; height:60px; margin:0 auto 16px; border-radius:18px; background:linear-gradient(135deg,#818cf8,#ec4899); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 28px rgba(236,72,153,.4);\">{{ iconEnterLg }}<\u002Fdiv>\n      <h1 style=\"font-size:28px; font-weight:900; margin:0 0 8px;\">الانضمام إلى غرفة<\u002Fh1>\n      <p style=\"font-size:15px; color:#a9a7cc; margin:0;\">أدخل رقم الغرفة المكوّن من 6 أرقام<\u002Fp>\n    <\u002Fdiv>\n    <label style=\"display:block; font-size:14px; font-weight:700; margin-bottom:8px; color:#d8d6ee;\">رقم الغرفة<\u002Flabel>\n    <input value=\"{{ joinCode }}\" oninput=\"{{ setJoinCode }}\" placeholder=\"000000\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-size:24px; font-weight:900; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:16px; padding:16px; margin-bottom:18px; outline:none; letter-spacing:8px; text-align:center;\" style-focus=\"border-color:rgba(129,140,248,.7);\">\n    <label style=\"display:block; font-size:14px; font-weight:700; margin-bottom:8px; color:#d8d6ee;\">اسم اللاعب<\u002Flabel>\n    <input value=\"{{ joinName }}\" oninput=\"{{ setJoinName }}\" placeholder=\"اكتب اسمك\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-size:16px; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px 16px; margin-bottom:22px; outline:none;\" style-focus=\"border-color:rgba(129,140,248,.7);\">\n    <button onclick=\"{{ doJoin }}\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-weight:700; font-size:17px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:16px; border-radius:16px; cursor:pointer; box-shadow:0 16px 40px rgba(236,72,153,.5);\" style-hover=\"filter:brightness(1.08);\">الانضمام ←<\u002Fbutton>\n    <button onclick=\"{{ goHome }}\" style=\"width:100%; margin-top:12px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; color:#a9a7cc; background:none; border:none; padding:10px; cursor:pointer;\" style-hover=\"color:#fff;\">← العودة للرئيسية<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- CREATE -->\n<sc-if value=\"{{ isCreate }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:relative; z-index:1; max-width:640px; margin:0 auto; padding:56px 24px 72px; animation:tqIn .4s ease;\" data-screen-label=\"Create\">\n  <sc-if value=\"{{ notCreated }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:28px; padding:40px; backdrop-filter:blur(16px); box-shadow:0 30px 80px rgba(0,0,0,.4);\">\n    <h1 style=\"font-size:30px; font-weight:900; margin:0 0 8px; text-align:center;\">إنشاء غرفة جديدة<\u002Fh1>\n    <p style=\"font-size:15px; color:#a9a7cc; margin:0 0 30px; text-align:center;\">اختر عددكم، سوِّ الغرفة، وجمّع الفريق للتحدي.<\u002Fp>\n    <label style=\"display:block; font-size:15px; font-weight:700; margin-bottom:14px; color:#d8d6ee;\">عدد اللاعبين<\u002Flabel>\n    <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-bottom:30px;\">\n      <sc-for list=\"{{ playerOptions }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ p.select }}\" style=\"padding:11px 22px; border-radius:30px; cursor:pointer; font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; background:{{ p.bg }}; border:{{ p.border }}; color:{{ p.color }}; transition:all .15s;\">{{ p.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <button onclick=\"{{ createRoom }}\" disabled=\"{{ creating }}\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-weight:700; font-size:18px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:17px; border-radius:18px; cursor:pointer; box-shadow:0 16px 40px rgba(236,72,153,.5);\" style-hover=\"filter:brightness(1.08);\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" style=\"vertical-align:-3px; margin-left:8px;\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>{{ createLabel }}<\u002Fbutton>\n    <button onclick=\"{{ goHome }}\" style=\"width:100%; margin-top:12px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; color:#a9a7cc; background:none; border:none; padding:10px; cursor:pointer;\" style-hover=\"color:#fff;\">← العودة للرئيسية<\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ created }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:28px; padding:40px; backdrop-filter:blur(16px); box-shadow:0 30px 80px rgba(0,0,0,.4); text-align:center;\">\n    <h2 style=\"font-size:26px; font-weight:900; margin:0 0 8px;\">الغرفة جاهزة!<\u002Fh2>\n    <p style=\"font-size:14px; color:#a9a7cc; margin:0 0 8px;\">امسح الكود أو شارك الرابط لدعوة فريقك<\u002Fp>\n    <sc-if value=\"{{ offline }}\" hint-placeholder-val=\"{{ false }}\">\n      <p style=\"font-size:12px; color:#fbbf24; margin:0 0 22px;\">تعذّر الاتصال بالخادم — تم توليد كود تجريبي محلياً<\u002Fp>\n    <\u002Fsc-if>\n    <div style=\"font-size:48px; font-weight:900; letter-spacing:10px; color:#c4b5fd; margin:18px 0;\">{{ roomCode }}<\u002Fdiv>\n    <div style=\"display:inline-grid; grid-template-columns:repeat(13,1fr); gap:2px; background:rgba(255,255,255,.04); border-radius:10px; padding:12px; margin-bottom:24px;\">\n      <sc-for list=\"{{ qrCells }}\" as=\"c\" hint-placeholder-count=\"169\">\n        <div style=\"width:12px; height:12px; border-radius:1px; background:{{ c.bg }};\"><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"text-align:right; margin-bottom:20px;\">\n      <div style=\"font-size:13px; font-weight:700; color:#d8d6ee; margin-bottom:8px;\">رابط المشاركة<\u002Fdiv>\n      <div style=\"display:flex; gap:8px;\">\n        <div style=\"flex:1; min-width:0; font-size:13px; color:#a9a7cc; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:12px 14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; direction:ltr; text-align:left;\">{{ shareUrl }}<\u002Fdiv>\n        <button onclick=\"{{ copyShare }}\" style=\"display:flex; align-items:center; gap:6px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:13px; color:#c4b5fd; background:rgba(129,140,248,.14); border:1px solid rgba(129,140,248,.35); padding:0 18px; border-radius:12px; cursor:pointer; white-space:nowrap;\" style-hover=\"background:rgba(129,140,248,.24); color:#fff;\">{{ iconShareSm }} {{ shareBtnLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:12px; flex-wrap:wrap;\">\n      <button onclick=\"{{ goTeams }}\" style=\"flex:1; min-width:160px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:16px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:15px; border-radius:16px; cursor:pointer; box-shadow:0 14px 32px rgba(236,72,153,.45);\" style-hover=\"filter:brightness(1.08);\">اختيار الفريق<\u002Fbutton>\n      <button onclick=\"{{ goCreate }}\" style=\"flex:1; min-width:160px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:16px; color:#f1f0ff; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); padding:15px; border-radius:16px; cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.1);\">غرفة أخرى<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- HOW -->\n<sc-if value=\"{{ isHow }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:relative; z-index:1; max-width:780px; margin:0 auto; padding:56px 24px 72px; animation:tqIn .4s ease;\" data-screen-label=\"How\">\n  <div style=\"text-align:center; margin-bottom:48px;\">\n    <div style=\"font-size:14px; font-weight:700; color:#818cf8; letter-spacing:2px; margin-bottom:12px;\">التعليمات<\u002Fdiv>\n    <h1 style=\"font-size:clamp(28px,4vw,42px); font-weight:900; margin:0;\">كيف تلعب؟<\u002Fh1>\n  <\u002Fdiv>\n  <div style=\"display:flex; flex-direction:column; gap:16px;\">\n    <div style=\"display:flex; gap:20px; align-items:flex-start; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:24px;\">\n      <div style=\"width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#818cf8,#ec4899); display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:900; flex-shrink:0;\">1<\u002Fdiv>\n      <div style=\"align-self:center;\"><h3 style=\"font-size:18px; font-weight:800; margin:0;\">لمّ فريقك — 3 لاعبين بالفريق.<\u002Fh3><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:20px; align-items:flex-start; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:24px;\">\n      <div style=\"width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#818cf8,#ec4899); display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:900; flex-shrink:0;\">2<\u002Fdiv>\n      <div style=\"align-self:center;\"><h3 style=\"font-size:18px; font-weight:800; margin:0;\">كل واحد قدامه صورة غير.<\u002Fh3><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:20px; align-items:flex-start; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:24px;\">\n      <div style=\"width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#818cf8,#ec4899); display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:900; flex-shrink:0;\">3<\u002Fdiv>\n      <div style=\"align-self:center;\"><h3 style=\"font-size:18px; font-weight:800; margin:0;\">وصّفوا لبعض بالكلام بس — لا تشّوفون!<\u002Fh3><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:20px; align-items:flex-start; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:24px;\">\n      <div style=\"width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#818cf8,#ec4899); display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:900; flex-shrink:0;\">4<\u002Fdiv>\n      <div style=\"align-self:center;\"><h3 style=\"font-size:18px; font-weight:800; margin:0;\">اربطوا التفاصيل وقرروا الجواب.<\u002Fh3><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:20px; align-items:flex-start; background:rgba(244,63,94,.06); border:1px solid rgba(244,63,94,.2); border-radius:20px; padding:24px;\">\n      <div style=\"width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#f43f5e,#ec4899); display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:900; flex-shrink:0;\">5<\u002Fdiv>\n      <div style=\"align-self:center;\"><h3 style=\"font-size:18px; font-weight:800; margin:0;\">هبدتوا الجواب؟ توقفون 15 ثانية.<\u002Fh3><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:20px; align-items:flex-start; background:rgba(52,211,153,.06); border:1px solid rgba(52,211,153,.2); border-radius:20px; padding:24px;\">\n      <div style=\"width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#34d399,#10b981); display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:900; flex-shrink:0; color:#06281c;\">6<\u002Fdiv>\n      <div style=\"align-self:center;\"><h3 style=\"font-size:18px; font-weight:800; margin:0;\">أسرع فريق يخلّص الجولات يكسب.<\u002Fh3><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ABOUT -->\n<sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:relative; z-index:1; max-width:720px; margin:0 auto; padding:56px 24px 72px; animation:tqIn .4s ease;\" data-screen-label=\"About\">\n  <div style=\"text-align:center; margin-bottom:40px;\">\n    <div style=\"font-size:14px; font-weight:700; color:#818cf8; letter-spacing:2px; margin-bottom:12px;\">عن اللعبة<\u002Fdiv>\n    <h1 style=\"font-size:clamp(28px,4vw,42px); font-weight:900; margin:0 0 16px;\">ما هي وصّلها؟<\u002Fh1>\n    <p style=\"font-size:16px; color:#a9a7cc; line-height:1.8; max-width:580px; margin:0 auto;\">لعبة الفريق الأولى للوصف السريع. كل واحد قدامه صورة، والفريق لازم يطلّع الجواب من كلامكم بس. صح كمّلوا… غلط توقفون 15 ثانية.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"background:linear-gradient(135deg,rgba(129,140,248,.14),rgba(236,72,153,.14)); border:1px solid rgba(255,255,255,.12); border-radius:24px; padding:34px; text-align:center; margin-bottom:32px;\">\n    <h2 style=\"font-size:24px; font-weight:900; margin:0 0 12px;\">ليه وصّلها؟<\u002Fh2>\n    <p style=\"font-size:16px; color:#d8d6ee; line-height:1.9; margin:0; max-width:560px; margin:0 auto;\">لأنها تكشف مين يفهم على بعض بسرعة. مو المهم تشوف الصورة… المهم كيف توصّلها. كلمة منك تقرّب الفريق من الفوز، أو توقفهم 15 ثانية.<\u002Fp>\n  <\u002Fdiv>\n  <h3 style=\"font-size:18px; font-weight:800; margin:0 0 18px; text-align:center; color:#c4b5fd;\">مناسبة لـ<\u002Fh3>\n  <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px;\">\n    <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:18px; padding:22px; text-align:center; font-size:16px; font-weight:700;\">جلسات الشباب<\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:18px; padding:22px; text-align:center; font-size:16px; font-weight:700;\">التجمعات العائلية<\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:18px; padding:22px; text-align:center; font-size:16px; font-weight:700;\">التحديات بين الأصدقاء<\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:18px; padding:22px; text-align:center; font-size:16px; font-weight:700;\">اللعب الجماعي أونلاين<\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:18px; padding:22px; text-align:center; font-size:16px; font-weight:700;\">الفعاليات والمسابقات<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- LOGIN -->\n<sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:relative; z-index:1; max-width:460px; margin:0 auto; =\"border-color:rgba(129,140,248,.7);\">\n      <label style=\"display:block; font-size:14px; font-weight:700; margin-bottom:8px; color:#d8d6ee;\">كلمة المرور<\u002Flabel>\n      <input type=\"password\" value=\"{{ loginPass }}\" oninput=\"{{ setLoginPass }}\" placeholder=\"••••••••\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-size:16px; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px 16px; margin-bottom:24px; outline:none;\" style-focus=\"border-color:rgba(129,140,248,.7);\">\n      <button onclick=\"{{ doLogin }}\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-weight:700; font-size:17px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:15px; border-radius:16px; cursor:pointer; box-shadow:0 14px 32px rgba(236,72,153,.45);\" style-hover=\"filter:brightness(1.08);\">دخول<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ isRegTab }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <label style=\"display:block; font-size:14px; font-weight:700; margin-bottom:8px; color:#d8d6ee;\">الاسم<\u002Flabel>\n      <input value=\"{{ regName }}\" oninput=\"{{ setRegName }}\" placeholder=\"اسمك الكامل\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-size:16px; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px 16px; margin-bottom:16px; outline:none;\" style-focus=\"border-color:rgba(129,140,248,.7);\">\n      <label style=\"display:block; font-size:14px; font-weight:700; margin-bottom:8px; color:#d8d6ee;\">كلمة المرور<\u002Flabel>\n      <input type=\"password\" value=\"{{ regPass }}\" oninput=\"{{ setRegPass }}\" placeholder=\"••••••••\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-size:16px; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px 16px; margin-bottom:16px; outline:none;\" style-focus=\"border-color:rgba(129,140,248,.7);\">\n      <label style=\"display:block; font-size:14px; font-weight:700; margin-bottom:8px; color:#d8d6ee;\">تأكيد كلمة المرور<\u002Flabel>\n      <input type=\"password\" placeholder=\"••••••••\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-size:16px; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px 16px; margin-bottom:24px; outline:none;\" style-focus=\"border-color:rgba(129,140,248,.7);\">\n      <button onclick=\"{{ doRegister }}\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-weight:700; font-size:17px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:15px; border-radius:16px; cursor:pointer; box-shadow:0 14px 32px rgba(236,72,153,.45);\" style-hover=\"filter:brightness(1.08);\">إنشاء الحساب<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <button onclick=\"{{ goHome }}\" style=\"width:100%; margin-top:14px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; color:#a9a7cc; background:none; border:none; padding:10px; cursor:pointer;\" style-hover=\"color:#fff;\">← العودة للرئيسية<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- TEAMS -->\n<sc-if value=\"{{ isTeams }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:relative; z-index:1; max-width:720px; margin:0 auto; padding:56px 24px 72px; animation:tqIn .4s ease;\" data-screen-label=\"Teams\">\n  <div style=\"text-align:center; margin-bottom:30px;\">\n    <h1 style=\"font-size:30px; font-weight:900; margin:0 0 6px;\">اختر فريقك<\u002Fh1>\n    <p style=\"font-size:15px; color:#a9a7cc; margin:0;\">أول من يختار فريقاً يصبح قائده ويسمّيه · رقم الغرفة <span style=\"color:#c4b5fd; font-weight:900; letter-spacing:3px;\">{{ teamsCode }}<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n  <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px;\">\n    <sc-for list=\"{{ teamCards }}\" as=\"c\" hint-placeholder-count=\"4\">\n      <div style=\"background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:20px; padding:24px; text-align:center;\">\n        <div style=\"width:54px; height:54px; margin:0 auto 14px; border-radius:16px; background:linear-gradient(135deg,#818cf8,#ec4899); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff;\">{{ c.num }}<\u002Fdiv>\n        <div style=\"font-size:18px; font-weight:800; margin-bottom:16px;\">{{ c.name }}<\u002Fdiv>\n        <sc-if value=\"{{ c.notSelecting }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onclick=\"{{ c.pick }}\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; color:#c4b5fd; background:rgba(129,140,248,.12); border:1px solid rgba(129,140,248,.3); padding:11px; border-radius:12px; cursor:pointer;\" style-hover=\"background:rgba(129,140,248,.22); color:#fff;\">اختر هذا الفريق<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ c.isSelecting }}\" hint-placeholder-val=\"{{ false }}\">\n          <input value=\"{{ teamName }}\" oninput=\"{{ setTeamName }}\" placeholder=\"اسم فريقك\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-size:15px; text-align:center; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(129,140,248,.5); border-radius:12px; padding:11px; margin-bottom:10px; outline:none;\">\n          <button onclick=\"{{ confirmTeam }}\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:11px; border-radius:12px; cursor:pointer;\" style-hover=\"filter:brightness(1.08);\">تأكيد ودخول اللوبي ←<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <button onclick=\"{{ goHome }}\" style=\"width:100%; margin- padding:12px 14px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:14px;\">\n          <div style=\"width:40px; height:40px; border-radius:12px; background:{{ p.avatarBg }}; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:15px; color:#1a1300;\">{{ p.slotLabel }}<\u002Fdiv>\n          <div style=\"flex:1; font-size:16px; font-weight:700;\">{{ p.name }}<\u002Fdiv>\n          <div style=\"font-size:13px; font-weight:700; color:{{ p.roleColor }};\">{{ p.roleText }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <sc-if value=\"{{ iAmCaptain }}\" hint-placeholder-val=\"{{ true }}\">\n      <button onclick=\"{{ startGame }}\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-weight:700; font-size:17px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:16px; border-radius:16px; cursor:pointer; box-shadow:0 16px 40px rgba(236,72,153,.5);\" style-hover=\"filter:brightness(1.08);\">ابدأ اللعبة الآن ←<\u002Fbutton>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ waitingForCaptain }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center; font-size:15px; font-weight:700; color:#a9a7cc; padding:14px; background:rgba(255,255,255,.03); border-radius:14px; animation:tqPulse 2s infinite;\">{{ waitingMsg }}<\u002Fdiv>\n    <\u002Fsc-if>\n    <button onclick=\"{{ goHome }}\" style=\"width:100%; margin-top:12px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; color:#a9a7cc; background:none; border:none; padding:10px; cursor:pointer;\" style-hover=\"color:#fff;\">← مغادرة الغرفة<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ADMIN -->\n<sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:relative; z-index:1; max-width:820px; margin:0 auto; padding:48px 24px 72px; animation:tqIn .4s ease;\" data-screen-label=\"Admin\">\n  <div style=\"display:flex; a nt-weight:500;\">(اختياري)<\u002Fspan><\u002Flabel>\n      <input value=\"{{ newQuestion }}\" oninput=\"{{ setNewQuestion }}\" placeholder=\"مثال: ما القاسم المشترك بين الصور؟\" style=\"width:100%; font-family:'Tajawal',sans-serif; font-size:15px; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:12px; padding:12px 14px; outline:none;\" style-focus=\"border-color:rgba(129,140,248,.7);\">\n    <\u002Fdiv>\n    <button onclick=\"{{ createRound }}\" style=\"font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:12px 26px; border-radius:12px; cursor:pointer;\" style-hover=\"filter:brightness(1.08);\">+ إنشاء الجولة<\u002Fbutton>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ hasAdminRounds }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex; flex-direction:column; gap:14px;\">\n    <sc-for list=\"{{ adminRounds }}\" as=\"r\" hint-placeholder-count=\"2\">\n      <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:18px; padding:20px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:8px;\">\n          <div style=\"flex:1;\"><div style=\"font-size:16px; font-weight:800;\">{{ r.hint }}<\u002Fdiv><div style=\"font-size:13px; color:#a9a7cc; margin-top:3px;\">الإجابات: {{ r.answersText }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-size:13px; font-weight:700; color:#818cf8; background:rgba(129,140,248,.12); padding:5px 12px; border-radius:20px;\">{{ r.imageCount }} صور<\u002Fdiv>\n          <button onclick=\"{{ r.del }}\" style=\"display:flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:10px; background:rgba(244,63,94,.12); border:1px solid rgba(244,63,94,.3); color:#f43f5e; cursor:pointer;\" style-hover=\"background:rgba(244,63,94,.2);\">{{ iconTrash }}<\u002Fbutton>\n        <\u002Fdiv>\n d rgba(52,211,153,.3); padding:7px 22px; border-radius:30px;\">{{ iconClockLg }}<span style=\"font-size:26px; font-weight:900; color:#34d399; font-variant-numeric:tabular-nums;\">{{ elapsedDisplay }}<\u002Fspan><\u002Fdiv>\n    <button onclick=\"{{ toggleRole }}\" title=\"اضغط لتجربة الدور الآخر\" style=\"display:flex; align-items:center; gap:7px; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; color:{{ roleColor }}; background:{{ roleBg }}; border:{{ roleBorder }}; padding:8px 16px; border-radius:30px; cursor:pointer;\">{{ roleIcon }} {{ roleLabel }}<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; margin-bottom:24px;\">\n    <div style=\"flex:2; min-width:280px;\">\n      <div style=\"font-size:13px; font-weight:700; color:#818cf8; margin-bottom:10px; display:flex; align-items:center; gap:6px;\">{{ iconImg }} صورتك — وصّلها لفريقك<\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:20px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,.35);\">\n        <div style=\"position:relative;\">\n          {{ currentImageEl }}\n          <button onclick=\"{{ openZoom }}\" title=\"تكبير الصورة\" style=\"position:absolute; top:12px; left:12px; display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:12px; background:rgba(10,8,30,.6); border:1px solid rgba(255,255,255,.18); color:#fff; cursor:pointer; backdrop-filter:blur(6px);\" style-hover=\"background:rgba(129,140,248,.7);\">{{ iconZoom }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:16px; display:flex; align-items:center; justify-content:space-between;\">\n          <div style=\"font-size:13px; color:#a9a7cc;\">هل تحتاج تلميحاً؟<\u002Fdiv>\n          <sc-if value=\"{{ notShowHint }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ toggleHint }}\" style=\"font-family:'Tajawal',sans-serif; font-size:13px; font-weight:700; color:#c4b5fd; background:rgba(129,140,248,.12); border:1px solid rgba(129,140,248,.3); padding:6px 16px; border-radius:20px; cursor:pointer;\" style-hover=\"background:rgba(129,140,248,.2);\">تلميح<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ showHint }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:14px; font-weight:700; color:#c4b5fd; background:rgba(129,140,248,.12); border:1px solid rgba(129,140,248,.3); padding:6px 16px; border-radius:20px;\">{{ currentImageHint }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1; min-width:160px; display:flex; flex-direction:column; gap:14px;\">\n      <sc-for list=\"{{ otherImages }}\" as=\"o\" hint-placeholder-count=\"2\">\n        <div>\n          <div style=\"font-size:13px; font-weight:700; color:#a9a7cc; margin-bottom:8px;\">{{ o.player }}<\u002Fdiv>\n          <div style=\"position:relative; border-radius:16px; overflow:hidden; height:130px; box-shadow:0 8px 24px rgba(0,0,0,.3);\">\n            {{ o.el }}\n            <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(10,8,30,.35);\">\n              <div style=\"width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; color:rgba(255,255,255,.65);\">؟<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:20px; padding:24px; backdrop-filter:blur(10px);\">\n    <sc-if value=\"{{ showMemberView }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"text-align:center; padding:10px;\">\n      <div style=\"width:54px; height:54px; margin:0 auto 14px; border-radius:50%; background:rgba(129,140,248,.15); border:1px solid rgba(129,140,248,.3); display:flex; align-items:center; justify-content:center; color:#818cf8;\">{{ iconMicLg }}<\u002Fdiv>\n      <div style=\"font-size:17px; font-weight:800; margin:0 0 6px;\">صِف صورتك لقائد الفريق<\u002Fdiv>\n      <p style=\"font-size:14px; color:#a9a7cc; margin:0; line-height:1.6;\">قائد الفريق وحده من يكتب الإجابة النهائية — ساعده بوصف دقيق لما تراه في صورتك.<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ showLockView }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"text-align:center; padding:8px; animation:lockShake .5s ease;\">\n      <div style=\"width:54px; height:54px; margin:0 auto 14px; border-radius:50%; background:rgba(244,63,94,.2); border:1px solid rgba(244,63,94,.4); display:flex; align-items:center; justify-content:center; color:#f43f5e;\">{{ iconLockLg }}<\u002Fdiv>\n      <div style=\"font-size:17px; font-weight:800; margin:0 0 16px;\">إجابة خاطئة — انتظر قبل المحاولة مجدداً<\u002Fdiv>\n      <div style=\"display:inline-flex; align-items:center; gap:8px; background:rgba(244,63,94,.15); border:1px solid rgba(244,63,94,.3); padding:10px 24px; border-radius:30px;\">\n        <div style=\"font-size:28px; font-weight:900; color:#f43f5e; font-variant-numeric:tabular-nums;\">{{ locked }}<\u002Fdiv>\n        <div style=\"font-size:14px; color:#a9a7cc;\">ثانية<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ showInputView }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <label style=\"display:flex; align-items:center; gap:7px; font-size:15px; font-weight:700; margin-bottom:12px; color:#d8d6ee;\">{{ roleIcon }} إجابة القائد — اكتب وش اتفقتوا عليه<\u002Flabel>\n      <div style=\"display:flex; gap:12px; flex-wrap:wrap;\">\n        <input value=\"{{ answer }}\" oninput=\"{{ setAnswer }}\" onkeydown=\"{{ handleKeyDown }}\" placeholder=\"اكتب الإجابة ثم اضغط إرسال أو Enter\" style=\"flex:1; min-width:200px; font-family:'Tajawal',sans-serif; font-size:16px; color:#f1f0ff; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px 18px; outline:none;\" style-focus=\"border-color:rgba(129,140,248,.7);\">\n        <button onclick=\"{{ submitAnswer }}\" style=\"display:flex; align-items:center; gap:8px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:16px; color:#fff; background:linear-gradient(135deg,#818cf8,#ec4899); border:none; padding:14px 26px; border-radius:14px; cursor:pointer; white-space:nowrap; box-shadow:0 8px 20px rgba(236,72,153,.4);\" style-hover=\"filter:brightness(1.08);\">{{ iconSend }} إرسال<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- IMAGE ZOOM LIGHTBOX -->\n<sc-if value=\"{{ zoomOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div onclick=\"{{ closeZoom }}\" style=\"position:fixed; inset:0; z-index:200; background:rgba(5,4,16,.92); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:28px; cursor:zoom-out; animation:tqIn .25s ease;\">\n  {{ zoomImageEl }}\n  <button onclick=\"{{ closeZoom }}\" title=\"إغلاق\" style=\"position:absolute; top:22px; left:22px; display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; cursor:pointer;\" style-hover=\"background:rgba(244,63,94,.7);\">{{ iconClose }}<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- RESULTS -->\n<sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:relative; z-index:1; max-width:640px; margin:0 auto; padding:56px 24px 72px; animation:tqIn .4s ease; text-align:center;\" data-screen-label=\"Results\">\n  <h1 style=\"font-size:clamp(30px,5vw,46px); font-weight:900; margin:0 0 8px;\">انتهت اللعبة!<\u002Fh1>\n  <p styl this._joinTeam(i, (this.state.teamName || '').trim());\n  }\n  joinExistingTeam(i) { this._joinTeam(i, ''); }\n  _joinTeam(i, teamName) {\n    const pname = (this.state.joinName || '').trim() || (this.state.user && this.state.user.username) || 'لاعب';\n    if (this.serverConnected) {\n      this._socket.emit('chooseTeam', { roomCode: this.state.roomCode, teamIndex: i, teamName, name: pname }, (res) => {\n        if (res && res.ok) this.setState({ teams: res.teams, myTeam: res.teamIndex, role: res.isCaptain ? 'captain' : 'member' }, () => this.go('lobby'));\n        else this.setState({ statusMsg: (res && res.error) || 'تعذّر اختيار الفريق' });\n      });\n      return;\n    }\n    const teams = (this.state.teams || []).slice();\n    const cur = teams[i] || { index: i, name: '', count: 0, max: 3, full: false, players: [] };\n    const isCaptain = cur.players.length === 0;\n    const players = cur.players.concat([{ name: pname, isCaptain }]);\n    teams[i] = { index: i, name: cur.name || teamName || ('فريق ' + (i + 1)), count: players.length, max: 3, full: players.length >= 3, players };\n    this.setState({ teams, myTeam: i, role: isCaptain ? 'captain' : 'member' }, () => this.go('lobby'));\n  }\n  setNewQuestion(e) { this.setState({ newQuestion: e.target.value }); }\n\n  api(pathname, opts) {\n    const base = (this.props && this.props.apiUrl) || (location.protocol.indexOf('http')===0 ? location.origin : 'http://localhost:3001');\n    const headers = { 'Content-Type': 'application/json' };\n    if (this.state.token) headers.Authorization = 'Bearer ' + this.state.token;\n    return fetch(base + pathname, Object.assign({ headers }, opts)).then(async (r) => {\n      const data = await r.json().catch(() => ({}));\n      if (!r.ok) throw Object.assign(new Error(data.error || 'خطأ'), { status: r.status, data });\n      return data;\n    });\n  }\n\n  connectSocket() {\n    if (this._socket || typeof window === 'undefined' || !window.io) return this._socket;\n    const bas ed) {\n      const ans = (s.answer || '').trim();\n      if (!ans) return;\n      this._socket.emit('submitAnswer', { answer: ans }, (res) => {\n        if (res && res.locked) this.setState({ locked: res.lockedSeconds, answer: '' });\n        else if (res && res.correct === false) this.setState({ locked: 15, answer: '' });\n      });\n      return;\n    }\n    const R = this.rounds();\n    const img = R[Math.min(s.roundIndex, R.length - 1)][0];\n    const ans = (s.answer || '').trim().toLowerCase();\n    if (!ans) return;\n    const ok = img.answers.some(a => {\n      const al = a.toLowerCase();\n      return al === ans || al.includes(ans) || ans.includes(al);\n    });\n    if (ok) {\n      this.setState(s2 => ({ roundIndex: s2.roundIndex + 1, answer: '', showHint: false, gameScore: s2.gameScore + 1 }), () => {\n        if (this.state.roundIndex >= R.length) { this.stopTimer(); this.go('results'); }\n      });\n    } else {\n      this.setState({ locked: 15, answer: '', showHint: false });\n      this.startPenalty();\n    }\n  }\n\n  setLoginName(e) { this.setState({ loginName: e.target.value }); }\n  setRegName(e) { this.setState({ regName: e.target.value }); }\n  setRegPass(e) { this.setState({ regPass: e.target.value }); }\n  async doLogin() {\n    const username = (this.state.loginName || '').trim();\n    try {\n      const { token, user } = await this.api('/api/auth/login', { method: 'POST', body: JSON.stringify({ username, password: this.state.loginPass || 'x' }) });\n      this.setState({ token, user, statusMsg: '' }, () => this.connectSocket());\n      this.go('home');\n    } catch (e) {\n      // احتياطي محلي (معاينة بلا خادم) — يُمنح المشرف لتجربة لوحة التحكم\n      this.setState({ user: { username: username || 'لاعب', isAdmin: true }, statusMsg: this._netNote(e) });\n      this.go('home');\n    }\n  }\n  async doRegister() {\n    const username = (this.state.regName || '').trim();\n    try {\n      const { token, user } = await this.api('/api/auth/registe
