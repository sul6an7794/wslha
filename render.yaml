services:
  - type: web
    name: team-quest
    runtime: node
    plan: free
    # منصة دورك الموحّدة (تجمع وصّلها + مافيا) — تحل محل السيرفر المستقل القديم.
    # لازم يبقى platform-server بجنب مجلدي wslha-server وmafia بنفس المستوى
    # لأن كوده يطلبهم كمسارات نسبية (../../mafia/server، ../../wslha-server/server).
    rootDir: platform-server
    # كود platform-server يطلب ملفات مافيا ووصّلها مباشرة (auth.js، rooms.js...)، وهالملفات
    # تحتاج مكتباتها الخاصة (bcryptjs، jsonwebtoken...) — لازم نثبّتها بمجلديها هما كمان،
    # مو بس جوا platform-server نفسه، وإلا يفشل التشغيل بخطأ "Cannot find module".
    buildCommand: npm install --prefix ../wslha-server/server && npm install --prefix ../mafia/server && npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://wslha.app
      - key: NODE_VERSION
        value: "20"
